name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: auth_user
          POSTGRES_PASSWORD: auth_password
          POSTGRES_DB: auth_api
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U auth_user -d auth_api"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://auth_user:auth_password@localhost:5432/auth_api
      NODE_ENV: test
      ACCESS_TOKEN_SECRET: test-access-secret-with-at-least-thirty-two-characters
      REFRESH_TOKEN_SECRET: test-refresh-secret-with-at-least-thirty-two-characters
      JWT_ISSUER: auth-api-test
      JWT_AUDIENCE: auth-api-test-clients
      REDIS_URL: redis://localhost:6379
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      DOCS_ENABLED: true
      BCRYPT_ROUNDS: 8

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage
