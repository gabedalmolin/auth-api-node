version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: auth_api_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_api
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_api"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
