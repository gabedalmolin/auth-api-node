services:
  app:
    environment:
      LOG_LEVEL: warn
      METRICS_ENABLED: "true"
      RATE_LIMIT_MAX_REQUESTS: "1000000"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:3000/health >/dev/null 2>&1 || exit 1
      interval: 5s
      timeout: 5s
      retries: 12

  k6:
    image: grafana/k6:0.49.0
    depends_on:
      app:
        condition: service_healthy
    environment:
      BASE_URL: http://app:3000
    volumes:
      - ./tests/load:/scripts
    command:
      - run
      - /scripts/auth-lifecycle.k6.mjs
